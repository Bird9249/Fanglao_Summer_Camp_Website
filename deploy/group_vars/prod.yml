# Fanglao Summer Camp 2026 — production deploy vars
app_name: "summer-camp-2026"
app_user: "root"
app_group: "root"

# paths บนเซิร์ฟเวอร์
app_root: "/opt/summer-camp-2026"
server_releases: "{{ app_root }}/releases"
server_current: "{{ app_root }}/current"

# โฟลเดอร์ repo โลคัล (รัน ansible จาก deploy/)
local_repo: "/home/bird/Desktop/fanglao/Summer_Camp_2026"
# ผลจาก `bun run build` (TanStack Start + Nitro preset bun)
local_server_dist: "{{ local_repo }}/.output"

# systemd & พอร์ต upstream (แยกจาก Fanglao Admin ที่ใช้ 3000)
service: "summer-camp-2026"
port: 3001

keep_releases: 5

# nginx + Let's Encrypt
domain: "summer2026.fanglaostudio.com"
ssl_email: "freedombrandofficial@gmail.com"
ssl_country: "LA"
ssl_state: "Vientiane"
ssl_organization: "Fanglao Studio"
